[changelog]
header = "# Changelog\n\nAll notable changes to Spacesly are documented here.\n"
body = """
{%- macro commit_url(commit) -%}
  https://github.com/iqbalsonata/spacesly/commit/{{ commit.id }}
{%- endmacro -%}

{%- macro pr_url(commit) -%}
  {%- if commit.pr_number -%}
    [#{{ commit.pr_number }}](https://github.com/iqbalsonata/spacesly/pull/{{ commit.pr_number }})
  {%- endif -%}
{%- endmacro -%}

{% for group, commits in commits | group_by(attribute="group") %}

### {{ group | upper_first() }}
{% for commit in commits %}
  - {{ commit.message | upper_first() }} ({{ self::pr_url(commit=commit) }}) [{{ self::commit_url(commit=commit) | trim_end_matches(1) }}]
{% endfor %}
{% endfor %}
"""
trim = true
postprocessors = []

[git]
conventional_commits = true
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^docs", group = "Documentation" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^perf", group = "Performance" },
  { message = "^test", group = "Testing" },
  { message = "^chore", group = "Housekeeping" },
  { message = "^ci", group = "CI/CD" },
  { message = "^style", group = "Styling" },
  { message = ".*", group = "Other", default_scope = "other" },
]
filter_commits = false
topo_order = false
sort_commits = "newest"
